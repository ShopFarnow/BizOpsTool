name: BizOps Trend Bot

on:
  schedule:
    - cron: "0 6 * * *"   # 06:00 UTC daily
  workflow_dispatch:       # Manual trigger from Actions tab

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests==2.32.3 httpx>=0.24.0 tenacity>=8.2.0 openai==1.35.7

      - name: Ensure docs/ directory structure
        run: |
          mkdir -p docs/tools docs/categories docs/vs docs/alternatives docs/use-cases
          touch docs/.nojekyll

      - name: Run scraper
        env:
          GITHUB_TOKEN:       ${{ secrets.BIZOPS_PAT }}
          OPENAI_API_KEY:     ${{ secrets.OPENAI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          BEEHIIV_API_KEY:    ${{ secrets.BEEHIIV_API_KEY }}
          BEEHIIV_PUB_ID:     ${{ secrets.BEEHIIV_PUB_ID }}
          DOCS_DIR:           docs
          SITE_BASE_URL:      https://bizopstool.com
          TOPICS:             "automation,workflow,low-code,nocode,crm,erp,analytics,devops,database,ai"
          MIN_STARS:          "500"
          TOP_N:              "10"
          DAYS_BACK:          "30"
          MAX_PAGES:          "3"
          SKIP_CI_CHECK:      "true"
        run: python scraper.py

      - name: Re-ensure .nojekyll after scraper
        run: touch docs/.nojekyll

      - name: Verify all outputs
        run: |
          echo "=== docs/ top-level ==="
          ls -la docs/
          echo ""
          echo "=== sitemap URL count ==="
          grep -c "<url>" docs/sitemap.xml || echo "WARNING: sitemap.xml missing"
          echo ""
          echo "=== trending.json tool count ==="
          python3 -c "import json; d=json.load(open('docs/trending.json')); print(f'  {d[\"tool_count\"]} tools')" || echo "WARNING: trending.json missing"
          echo ""
          echo "=== page counts ==="
          echo "  Tool pages:        $(ls docs/tools/ 2>/dev/null | wc -l)"
          echo "  Category pages:    $(ls docs/categories/ 2>/dev/null | wc -l)"
          echo "  Comparison pages:  $(ls docs/vs/ 2>/dev/null | wc -l)"
          echo "  Alt pages:         $(ls docs/alternatives/ 2>/dev/null | wc -l)"
          echo "  Use-case pages:    $(ls docs/use-cases/ 2>/dev/null | wc -l)"

      - name: Commit and push to GitHub
        run: |
          git config user.name  "BizOps Bot"
          git config user.email "bot@bizopstool.com"
          git add docs/
          git add docs/.nojekyll
          git diff --cached --quiet || git commit -m "chore: daily trend update $(date -u +%Y-%m-%d)"
          git push

      # Optional: trigger Netlify redeploy after push
      # Set NETLIFY_DEPLOY_HOOK secret to your Netlify build hook URL
      - name: Commit and push to GitHub
        run: |
          git config user.name  "BizOps Bot"
          git config user.email "bot@bizopstool.com"
          git add docs/
          git add docs/.nojekyll
          git diff --cached --quiet || git commit -m "chore: daily trend update $(date -u +%Y-%m-%d)"
          git push

      - name: Trigger Netlify deploy (optional)
        if: env.NETLIFY_HOOK != ''
        env:
          NETLIFY_HOOK: ${{ secrets.NETLIFY_DEPLOY_HOOK }}
        run: curl -s -X POST "$NETLIFY_HOOK" | jq .
