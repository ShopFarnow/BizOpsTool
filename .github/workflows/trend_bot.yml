name: GitHub Trend Bot

on:
  schedule:
    - cron: '30 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          GITHUB_TOKEN:        ${{ secrets.BIZOPS_PAT }}
          OPENAI_API_KEY:      ${{ secrets.OPENAI_API_KEY }}
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          SKIP_CI_CHECK:       "true"
          DOCS_DIR:            "docs"
          SITE_BASE_URL:       "https://bizopstool.com"
          # Critical: BizOps topic filter
          TOPICS:              "low-code,automation,crm,erp,analytics,nocode,workflow,business"
          LANGUAGES:           "Python,TypeScript,JavaScript"
          # Beehiiv (optional)
          BEEHIIV_API_KEY:     ${{ secrets.BEEHIIV_API_KEY }}
          BEEHIIV_PUB_ID:      ${{ secrets.BEEHIIV_PUB_ID }}
        run: python scraper.py

      - name: Commit and push (first run safe)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          touch docs/.nojekyll
          git add docs/trending.json docs/tools/ docs/sitemap.xml docs/.nojekyll docs/tools.html
          if git log -1 --pretty=%B | grep -q "Update trend data"; then
            git commit --amend --no-edit --allow-empty
            git push --force-with-lease
          else
            git commit -m "Update trend data"
            git push
          fi

      - name: Verify output
        run: |
          echo "=== trending.json preview ==="
          head -c 500 docs/trending.json
          echo ""
          echo "=== Tools count ==="
          ls docs/tools/ | wc -l
