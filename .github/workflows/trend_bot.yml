name: BizOps Trend Bot

on:
  schedule:
    - cron: "0 6 * * *"   # 06:00 UTC daily
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests==2.32.3 httpx tenacity openai==1.35.7

      - name: Ensure docs/ structure
        run: |
          mkdir -p docs/tools docs/categories
          touch docs/.nojekyll

      - name: Run scraper
        env:
          GITHUB_TOKEN:       ${{ secrets.BIZOPS_PAT }}
          OPENAI_API_KEY:     ${{ secrets.OPENAI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          BEEHIIV_API_KEY:    ${{ secrets.BEEHIIV_API_KEY }}
          BEEHIIV_PUB_ID:     ${{ secrets.BEEHIIV_PUB_ID }}
          DOCS_DIR:           docs
          SITE_BASE_URL:      https://bizopstool.com
          TOPICS:  "automation,workflow,low-code,nocode,crm,erp,analytics,devops,database,ai"
          MIN_STARS:    "150"
          TOP_N:        "10"
          DAYS_BACK:    "30"
          MAX_PAGES:    "3"
          SKIP_CI_CHECK: "true"
        run: python scraper.py

      - name: Re-ensure .nojekyll
        run: touch docs/.nojekyll

      - name: Verify outputs
        run: |
          echo "=== docs/ top-level ==="
          ls -la docs/
          echo ""
          echo "=== sitemap ==="
          head -5 docs/sitemap.xml || echo "WARNING: sitemap.xml missing"
          echo ""
          echo "=== trending.json ==="
          head -3 docs/trending.json || echo "WARNING: trending.json missing"
          echo ""
          echo "=== tool pages ==="
          ls docs/tools/ | wc -l
          echo ""
          echo "=== category pages ==="
          ls docs/categories/ | wc -l

      - name: Commit and push
        run: |
          git config user.name  "BizOps Bot"
          git config user.email "bot@bizopstool.com"
          git add docs/
          git add docs/.nojekyll
          git diff --cached --quiet || git commit -m "chore: daily trend update $(date -u +%Y-%m-%d)"
          git push
