name: GitHub Trend Bot

on:
  schedule:
    - cron: '30 3 * * *'
  workflow_dispatch:

# 👇 Permissions must be at root level
permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SKIP_CI_CHECK: "true"
        run: python scraper.py

      - name: Commit and push trending.json + .nojekyll
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Create empty .nojekyll if it doesn't exist
          touch .nojekyll
          git add trending.json .nojekyll
          git diff --quiet && git diff --staged --quiet || git commit -m "Update trending.json and ensure .nojekyll"
          git push
