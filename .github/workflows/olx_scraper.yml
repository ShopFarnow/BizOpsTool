# .github/workflows/olx_scraper_openai.yml
#
# Runs the OLX arbitrage scraper every day at 09:00 IST (03:30 UTC).
# Also manually triggerable: Actions tab → "Run workflow"
#
# Required secrets (Settings → Secrets and variables → Actions → New secret):
#   OPENAI_API_KEY       — your OpenAI API key (platform.openai.com → API keys)
#   TELEGRAM_BOT_TOKEN   — from @BotFather
#   TELEGRAM_CHAT_ID     — your personal Telegram chat ID

name: OLX Arbitrage Scraper

on:
  schedule:
    - cron: "30 3 * * *"   # 09:00 IST daily  (UTC+5:30 → subtract 5:30)
  workflow_dispatch:         # manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15      # ← HARD KILL: entire job dies after 15 min no matter what
                             #   prevents the 3h+ hang you saw. Normal runs finish in ~3 min.

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Run OLX scraper
        timeout-minutes: 10  # ← step-level kill: scraper gets max 10 min
        env:
          OPENAI_API_KEY:      ${{ secrets.OPENAI_API_KEY }}
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python olx_arbitrage_openai.py

      - name: Upload results
        if: always()          # upload even if scraper hit timeout
        uses: actions/upload-artifact@v4
        with:
          name: olx-results-${{ github.run_number }}
          path: data/
          retention-days: 30
