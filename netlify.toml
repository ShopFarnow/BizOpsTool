[build]
  publish = "docs"
  environment = ["OPENAI_API_KEY", "NODE_VERSION"]

[functions]
  directory = "netlify/functions"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"

[[redirects]]
  from = "/api/grade-stack"
  to = "/.netlify/functions/grade-stack"
  status = 200
